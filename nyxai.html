<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX GPT AI V3 - Premium Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #111115;
            --bg-panel: #16161c;
            --bg-input: #1d1d24;
            --accent-red: #ff2a44;
            --accent-red-glow: rgba(255, 42, 68, 0.4);
            --accent-red-dim: rgba(255, 42, 68, 0.12);
            --text-main: #f3f4f6;
            --text-muted: #8a8d98;
            --border-color: rgba(255, 255, 255, 0.04);
            --border-neon: rgba(255, 42, 68, 0.2);
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
            display: flex;
            position: relative;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 16px;
            z-index: 99;
            height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .btn-back-sidebar {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-back-sidebar:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-red), #ff6b7d);
            border-radius: 6px;
            box-shadow: 0 0 12px var(--accent-red-glow);
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .btn-new-chat {
            width: 100%;
            background: linear-gradient(90deg, rgba(255,42,44,0.08) 0%, rgba(255,42,44,0.01) 100%);
            border: 1px solid var(--border-neon);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-new-chat:hover {
            border-color: var(--accent-red);
            box-shadow: 0 0 15px var(--accent-red-glow);
        }

        .chat-list {
            flex: 1;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            animation: fadeIn 0.2s ease-out;
            border-left: 2px solid transparent;
        }

        .chat-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        /* Penanda aktif warna merah khas */
        .chat-item.active {
            border-left: 2px solid var(--accent-red);
            color: var(--text-main);
            background: linear-gradient(90deg, rgba(255,42,68,0.06) 0%, transparent 100%);
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vip-badge {
            background: linear-gradient(135deg, #1e1215 0%, #2d1317 100%);
            border: 1px solid var(--border-neon);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent-red);
            letter-spacing: 1px;
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column; 
            background-color: var(--bg-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* HEADER */
        .header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            background-color: var(--bg-main);
            z-index: 90;
            flex-shrink: 0; 
        }

        .btn-hamburger {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-hamburger:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .dropdown-model-container {
            position: relative;
        }

        .btn-dropdown-model {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .dropdown-menu-down {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 240px;
            background-color: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100;
            animation: slideDown 0.12s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .dropdown-item:hover, .dropdown-item.active {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .dropdown-item.active {
            border-left: 2px solid var(--accent-red);
            background-color: var(--accent-red-dim);
        }

        /* --- CHAT VIEW AREA --- */
        .chat-view {
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 24px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            scroll-behavior: smooth;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 740px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            min-height: min-content; 
        }

        .welcome-screen {
            text-align: center;
            margin: auto 0; 
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .welcome-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 42, 68, 0.15);
            margin-bottom: 8px;
        }

        .welcome-subtitle-1 {
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .welcome-subtitle-2 {
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .welcome-action-text {
            color: var(--accent-red);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            background-color: var(--accent-red-dim);
            border: 1px solid rgba(255, 42, 68, 0.15);
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(255, 42, 68, 0.05);
        }

        /* --- CHAT BUBBLE SYSTEM --- */
        .message-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 85%;
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-container.user {
            align-self: flex-end;
        }

        .message-container.ai {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.96rem;
            word-wrap: break-word;
        }

        .message-container.user .msg-bubble {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px 16px 4px 16px;
        }

        .message-container.ai .msg-bubble {
            background-color: transparent;
            color: var(--text-main);
            padding-left: 0; 
        }

        .msg-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }

        .message-container:hover .msg-actions {
            opacity: 1;
        }

        .message-container.ai .msg-actions {
            padding-left: 0;
        }

        .message-container.user .msg-actions {
            justify-content: flex-end;
        }

        .btn-msg-action {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-msg-action:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .btn-msg-action:hover.action-red {
            color: var(--accent-red);
        }

        /* --- AMAN: FOOTER INPUT AREA BAR CONTAINER (+15px EXTRA SEHINGGA SEKARANG 62px) --- */
        .input-area-container {
            width: 100%;
            padding: 12px 20px 91px 20px; 
            display: flex;
            justify-content: center;
            background-color: var(--bg-main); 
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            z-index: 10;
            flex-shrink: 0; 
        }

        .input-box {
            width: 100%;
            max-width: 740px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-box:focus-within {
            border-color: rgba(255, 42, 68, 0.3);
            box-shadow: 0 0 25px rgba(255, 42, 68, 0.05);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.98rem;
            resize: vertical; 
            min-height: 26px;
            max-height: 160px;
            line-height: 1.5;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        textarea::placeholder {
            color: #5c5e69;
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 10px;
        }

        .action-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-action:hover {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .dropup-mode-container {
            position: relative;
        }

        .btn-dropup-mode {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0 12px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .dropdown-menu-up {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            width: 150px;
            background-color: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100;
            animation: slideUp 0.12s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-send {
            background-color: var(--accent-red);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            background-color: #ff455b;
            box-shadow: 0 4px 15px var(--accent-red-glow);
        }

        /* SCROLLBAR STYLE */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div>
            <div class="brand-wrapper">
                <button class="btn-back-sidebar" id="btn-back-sidebar" title="Sembunyikan Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="brand">
                    <div class="brand-logo"></div>
                    <div class="brand-name">NYX SYSTEM</div>
                </div>
            </div>
            
            <button class="btn-new-chat" id="btn-new-chat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Obrolan Baru
            </button>

            <div class="chat-list" id="chat-list"></div>
        </div>
        <div class="sidebar-footer">
            <div class="vip-badge">VIP ACCESS</div>
            <span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Premium</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <button class="btn-hamburger" id="btn-hamburger" title="Buka Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            
            <div class="dropdown-model-container">
                <button class="btn-dropdown-model" id="btn-model-selector">
                    <span id="current-model">NYX AI V3</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <div class="dropdown-menu-down" id="model-dropdown">
                    <div class="dropdown-item active" data-value="NYX AI V3">NYX AI V3</div>
                    <div class="dropdown-item" data-value="ChatGPT Plus 5.5">ChatGPT Plus 5.5</div>
                    <div class="dropdown-item" data-value="Chatgpt 4">Chatgpt 4</div>
                    <div class="dropdown-item" data-value="Gemini Flash 2.5">Gemini Flash 2.5</div>
                    <div class="dropdown-item" data-value="Gemini Pro 4">Gemini Pro 4</div>
                    <div class="dropdown-item" data-value="Claude Sonnet 4.7">Claude Sonnet 4.7</div>
                    <div class="dropdown-item" data-value="Claude Haiku 4.4">Claude Haiku 4.4</div>
                </div>
            </div>
        </header>

        <section class="chat-view" id="chat-view">
            <div class="chat-wrapper" id="chat-wrapper">
                <div class="welcome-screen" id="welcome-screen">
                    <h1 class="welcome-title">NYX GPT AI V3</h1>
                    <p class="welcome-subtitle-1">Assisten AI Yang Membantu Dan Memahami.</p>
                    <p class="welcome-subtitle-2">Dengan Cara Berpikir Cerdas Pintar</p>
                    <div class="welcome-action-text">Ayo Mulai Obrolan Untuk Menanya Kepada NYX GPT</div>
                </div>
            </div>
        </section>

        <footer class="input-area-container">
            <div class="input-box">
                <div class="input-row">
                    <textarea id="chat-input" placeholder="Tanya NYX GPT" rows="1"></textarea>
                </div>
                <div class="input-actions">
                    <div class="action-left">
                        <button class="btn-action" title="Add Image" onclick="document.getElementById('file-input').click()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </button>
                        <input type="file" id="file-input" style="display: none;" accept="image/*">

                        <div class="dropup-mode-container">
                            <button class="btn-dropup-mode" id="btn-mode-selector">
                                <span id="current-mode">Flash</span>
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
                            </button>
                            <div class="dropdown-menu-up" id="mode-dropdown">
                                <div class="dropdown-item active" data-value="Flash">Flash</div>
                                <div class="dropdown-item" data-value="Thinking">Thinking</div>
                                <div class="dropdown-item" data-value="Deep">Deep</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-send" id="btn-send">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(45deg) translate(-1px, 1px);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </footer>
    </main>

    <script>
        // --- CHAT SESSION MANAGEMENT DATABASE ---
        let chatSessions = {}; 
        let currentChatId = null; 

        const sidebar = document.getElementById('sidebar');
        const btnHamburger = document.getElementById('btn-hamburger');
        const btnBackSidebar = document.getElementById('btn-back-sidebar');
        
        const modelBtn = document.getElementById('btn-model-selector');
        const modelDropdown = document.getElementById('model-dropdown');
        const currentModelText = document.getElementById('current-model');

        const modeBtn = document.querySelector('.btn-dropup-mode');
        const modeDropdown = document.getElementById('mode-dropdown');
        const currentModeText = document.getElementById('current-mode');

        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');
        const chatView = document.getElementById('chat-view');
        const chatWrapper = document.getElementById('chat-wrapper');
        const welcomeScreen = document.getElementById('welcome-screen');
        const btnNewChat = document.getElementById('btn-new-chat');
        const chatList = document.getElementById('chat-list');

        // --- SIDEBAR ACTIONS ---
        btnHamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.remove('collapsed');
            sidebar.classList.add('open');
        });

        btnBackSidebar.addEventListener('click', () => {
            sidebar.classList.add('collapsed');
            sidebar.classList.remove('open');
        });

        // --- DROPDOWNS SYSTEM ---
        modelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            modelDropdown.style.display = modelDropdown.style.display === 'flex' ? 'none' : 'flex';
            modeDropdown.style.display = 'none';
        });

        modeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            modeDropdown.style.display = modeDropdown.style.display === 'flex' ? 'none' : 'flex';
            modelDropdown.style.display = 'none';
        });

        document.addEventListener('click', () => {
            modelDropdown.style.display = 'none';
            modeDropdown.style.display = 'none';
        });

        modelDropdown.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                modelDropdown.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentModelText.textContent = item.getAttribute('data-value');
            });
        });

        modeDropdown.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                modeDropdown.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentModeText.textContent = item.getAttribute('data-value');
            });
        });

        // --- AUTOMATIC EXPAND TEXTAREA ---
        chatInput.addEventListener('input', function() {
            this.style.height = '26px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // --- COPY CLIPBOARD ENGINE ---
        function copyText(el, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = el.innerHTML;
                el.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff66" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                setTimeout(() => el.innerHTML = originalHtml, 1500);
            });
        }

        function regenerateResponse(textPrompt) {
            appendMessageUI(`Mengulang pemrosesan modul untuk perintah: "${textPrompt}"...`, false);
        }

        // --- RENDER MESSAGE ELEMENT ONLY ---
        function appendMessageUI(text, isUser = false) {
            if (welcomeScreen.style.display !== 'none') {
                welcomeScreen.style.display = 'none';
            }

            const container = document.createElement('div');
            container.classList.add('message-container', isUser ? 'user' : 'ai');

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.innerText = text;
            container.appendChild(bubble);

            const actionsRow = document.createElement('div');
            actionsRow.classList.add('msg-actions');

            const copyBtn = document.createElement('button');
            copyBtn.classList.add('btn-msg-action');
            copyBtn.title = "Salin Teks";
            copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            copyBtn.addEventListener('click', () => copyText(copyBtn, text));
            actionsRow.appendChild(copyBtn);

            if(!isUser) {
                const redoBtn = document.createElement('button');
                redoBtn.classList.add('btn-msg-action', 'action-red');
                redoBtn.title = "Ulang Respon";
                redoBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>`;
                redoBtn.addEventListener('click', () => regenerateResponse(text));
                actionsRow.appendChild(redoBtn);
            }

            container.appendChild(actionsRow);
            chatWrapper.appendChild(container);
            chatView.scrollTop = chatView.scrollHeight;
        }

        // --- CORE LOAD CHAT SESSION SYSTEM ---
        function loadChatSession(id) {
            currentChatId = id;

            // Beri tanda warna merah (.active) hanya pada target obrolan ini
            chatList.querySelectorAll('.chat-item').forEach(item => {
                if (item.getAttribute('data-id') === id) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // Bersihkan sisa tampilan pesan obrolan sebelumnya
            const previousBubbles = chatWrapper.querySelectorAll('.message-container');
            previousBubbles.forEach(b => b.remove());

            // Load data pesan dari session state array database
            const session = chatSessions[id];
            if (session && session.messages.length > 0) {
                welcomeScreen.style.display = 'none';
                session.messages.forEach(msg => {
                    appendMessageUI(msg.text, msg.isUser);
                });
            } else {
                welcomeScreen.style.display = 'flex';
            }

            // TUTUP SIDEBAR SECARA OTOMATIS SAAT KLIK OBROLAN LAIN
            sidebar.classList.add('collapsed');
            sidebar.classList.remove('open');
        }

        // ── AUTH: check token on load ─────────────────────────────────────
        const _API = window.location.origin;
        const _token = localStorage.getItem('nyxai_token') || '';
        if (!_token) { window.location.href = '/login.html'; }
        else {
            fetch(_API + '/api/verify', { headers: { Authorization: 'Bearer ' + _token } })
                .then(r => r.json())
                .then(d => { if (!d.valid) { localStorage.removeItem('nyxai_token'); window.location.href = '/login.html'; } })
                .catch(() => {});
        }

        // ── MODEL MAP (name shown in UI → OpenRouter slug) ────────────────
        const MODEL_SLUG = {
            'NYX AI V3':        'deepseek/deepseek-chat-v3-0324:free',
            'ChatGPT Plus 5.5': 'openai/gpt-4o',
            'ChatGPT 4':        'openai/gpt-4',
            'Gemini Flash 3':   'google/gemini-2.0-flash-exp:free',
            'Gemini Pro 3':     'google/gemini-pro-1.5',
            'Claude Sonnet 4.6':'anthropic/claude-3.5-sonnet',
        };

        // ── TYPING INDICATOR ──────────────────────────────────────────────
        function showTyping() {
            const c = document.createElement('div');
            c.classList.add('message-container', 'ai');
            c.id = '_typing';
            c.innerHTML = '<div class="msg-bubble" style="display:flex;gap:5px;align-items:center;padding:14px 16px">' +
                '<span style="width:6px;height:6px;border-radius:50%;background:var(--accent-red);animation:_tp 1.2s ease-in-out infinite"></span>' +
                '<span style="width:6px;height:6px;border-radius:50%;background:var(--accent-red);animation:_tp 1.2s ease-in-out .15s infinite"></span>' +
                '<span style="width:6px;height:6px;border-radius:50%;background:var(--accent-red);animation:_tp 1.2s ease-in-out .3s infinite"></span>' +
                '</div>';
            if (!document.getElementById('_tp_style')) {
                const st = document.createElement('style');
                st.id = '_tp_style';
                st.textContent = '@keyframes _tp{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.4);opacity:1}}';
                document.head.appendChild(st);
            }
            chatWrapper.appendChild(c);
            chatView.scrollTop = chatView.scrollHeight;
        }
        function removeTyping() { const e = document.getElementById('_typing'); if (e) e.remove(); }

        // ── CORE SEND — real streaming fetch to /api/chat ─────────────────
        let _busy = false;

        async function handleSend() {
            const query = chatInput.value.trim();
            if (!query || _busy) return;

            // Create session if needed
            if (currentChatId === null) {
                currentChatId = 'session_' + Date.now();
                const title = query.length > 28 ? query.substring(0, 28) + '…' : query;
                chatSessions[currentChatId] = { title, messages: [] };
                const newItem = document.createElement('div');
                newItem.classList.add('chat-item');
                newItem.innerText = title;
                newItem.setAttribute('data-id', currentChatId);
                newItem.addEventListener('click', () => loadChatSession(newItem.getAttribute('data-id')));
                chatList.insertBefore(newItem, chatList.firstChild);
            }

            // Build messages array for API (role/content format)
            const history = (chatSessions[currentChatId].messages || []).slice(-20).map(m => ({
                role: m.isUser ? 'user' : 'assistant',
                content: m.text,
            }));
            history.push({ role: 'user', content: query });

            chatSessions[currentChatId].messages.push({ text: query, isUser: true });
            appendMessageUI(query, true);
            if (welcomeScreen) welcomeScreen.style.display = 'none';

            chatInput.value = '';
            chatInput.style.height = '26px';

            _busy = true;
            btnSend.disabled = true;
            showTyping();

            try {
                const modelName = currentModelText ? currentModelText.textContent : 'NYX AI V3';
                const modelSlug = MODEL_SLUG[modelName] || 'deepseek/deepseek-chat-v3-0324:free';

                const res = await fetch(_API + '/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + _token,
                    },
                    body: JSON.stringify({
                        messages: history,
                        temperature: 0.7,
                        max_tokens: 4096,
                    }),
                });

                removeTyping();

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'HTTP ' + res.status);
                }

                // Create AI bubble for streaming
                const container = document.createElement('div');
                container.classList.add('message-container', 'ai');
                const bubble = document.createElement('div');
                bubble.classList.add('msg-bubble');
                bubble.style.whiteSpace = 'pre-wrap';
                container.appendChild(bubble);
                chatWrapper.appendChild(container);
                chatView.scrollTop = chatView.scrollHeight;

                // Stream read
                const reader = res.body.getReader();
                const dec = new TextDecoder();
                let full = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = dec.decode(value, { stream: true });
                    for (const line of chunk.split('\n')) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const j = JSON.parse(data);
                            if (j.error) throw new Error(j.error.message || j.error);
                            const delta = j.choices?.[0]?.delta?.content || '';
                            if (delta) {
                                full += delta;
                                bubble.textContent = full;
                                chatView.scrollTop = chatView.scrollHeight;
                            }
                        } catch (pe) {
                            if (pe.message && !pe.message.includes('JSON')) throw pe;
                        }
                    }
                }

                // Add action buttons after stream done
                const actionsRow = document.createElement('div');
                actionsRow.classList.add('msg-actions');
                const copyBtn = document.createElement('button');
                copyBtn.classList.add('btn-msg-action');
                copyBtn.title = 'Copy';
                copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                copyBtn.addEventListener('click', () => copyText(copyBtn, full));
                const retryBtn = document.createElement('button');
                retryBtn.classList.add('btn-msg-action', 'action-red');
                retryBtn.title = 'Retry';
                retryBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>';
                retryBtn.addEventListener('click', () => { chatInput.value = query; handleSend(); });
                actionsRow.appendChild(copyBtn);
                actionsRow.appendChild(retryBtn);
                container.appendChild(actionsRow);

                // Save to session
                chatSessions[currentChatId].messages.push({ text: full, isUser: false });

            } catch (err) {
                removeTyping();
                appendMessageUI('⚠ Error: ' + err.message, false);
                chatSessions[currentChatId].messages.push({ text: '⚠ Error: ' + err.message, isUser: false });
            } finally {
                _busy = false;
                btnSend.disabled = false;
            }
        }

        btnSend.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // --- FIX: BUTTON OBROLAN BARU (KOSONG TOTAL TANPA PENANDA MERAH SAMA SEKALI) ---
        btnNewChat.addEventListener('click', () => {
            currentChatId = null; // Reset ke mode room kosong

            // Hapus semua penanda kelas merah aktif (Sesuai Permintaan)
            chatList.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));

            // Kosongkan gelembung balon chat pada UI layar
            const activeBubbles = chatWrapper.querySelectorAll('.message-container');
            activeBubbles.forEach(bubble => bubble.remove());

            // Tampilkan kembali Welcome Screen Teks Utama NYX GPT
            welcomeScreen.style.display = 'flex';

            // Tutup sidebar otomatis
            sidebar.classList.add('collapsed');
            sidebar.classList.remove('open');
        });
    </script>
</body>
</html>
