<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYX GPT AI V3 - Premium Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0b0b0d;
            --bg-sidebar: #111115;
            --bg-panel: #16161c;
            --bg-input: #1d1d24;
            --accent-red: #ff2a44;
            --accent-red-glow: rgba(255, 42, 68, 0.4);
            --accent-red-dim: rgba(255, 42, 68, 0.12);
            --text-main: #f3f4f6;
            --text-muted: #8a8d98;
            --border-color: rgba(255, 255, 255, 0.04);
            --border-neon: rgba(255, 42, 68, 0.2);
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
            display: flex;
            position: relative;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 16px;
            z-index: 99;
            height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .btn-back-sidebar {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-back-sidebar:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-red), #ff6b7d);
            border-radius: 6px;
            box-shadow: 0 0 12px var(--accent-red-glow);
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .btn-new-chat {
            width: 100%;
            background: linear-gradient(90deg, rgba(255,42,44,0.08) 0%, rgba(255,42,44,0.01) 100%);
            border: 1px solid var(--border-neon);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-new-chat:hover {
            border-color: var(--accent-red);
            box-shadow: 0 0 15px var(--accent-red-glow);
        }

        .chat-list {
            flex: 1;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            animation: fadeIn 0.2s ease-out;
            border-left: 2px solid transparent;
        }

        .chat-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        /* Penanda aktif warna merah khas */
        .chat-item.active {
            border-left: 2px solid var(--accent-red);
            color: var(--text-main);
            background: linear-gradient(90deg, rgba(255,42,68,0.06) 0%, transparent 100%);
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vip-badge {
            background: linear-gradient(135deg, #1e1215 0%, #2d1317 100%);
            border: 1px solid var(--border-neon);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent-red);
            letter-spacing: 1px;
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column; 
            background-color: var(--bg-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* HEADER */
        .header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            background-color: var(--bg-main);
            z-index: 90;
            flex-shrink: 0; 
        }

        .btn-hamburger {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-hamburger:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .dropdown-model-container {
            position: relative;
        }

        .btn-dropdown-model {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .dropdown-menu-down {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 240px;
            background-color: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100;
            animation: slideDown 0.12s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .dropdown-item:hover, .dropdown-item.active {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .dropdown-item.active {
            border-left: 2px solid var(--accent-red);
            background-color: var(--accent-red-dim);
        }

        /* --- CHAT VIEW AREA --- */
        .chat-view {
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 24px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            scroll-behavior: smooth;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 740px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            min-height: min-content; 
        }

        .welcome-screen {
            text-align: center;
            margin: auto 0; 
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .welcome-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255, 42, 68, 0.15);
            margin-bottom: 8px;
        }

        .welcome-subtitle-1 {
            color: var(--text-main);
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .welcome-subtitle-2 {
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .welcome-action-text {
            color: var(--accent-red);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            background-color: var(--accent-red-dim);
            border: 1px solid rgba(255, 42, 68, 0.15);
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(255, 42, 68, 0.05);
        }

        /* --- CHAT BUBBLE SYSTEM --- */
        .message-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 85%;
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-container.user {
            align-self: flex-end;
        }

        .message-container.ai {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.96rem;
            word-wrap: break-word;
        }

        .message-container.user .msg-bubble {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 16px 16px 4px 16px;
        }

        .message-container.ai .msg-bubble {
            background-color: transparent;
            color: var(--text-main);
            padding-left: 0; 
        }

        .msg-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }

        .message-container:hover .msg-actions {
            opacity: 1;
        }

        .message-container.ai .msg-actions {
            padding-left: 0;
        }

        .message-container.user .msg-actions {
            justify-content: flex-end;
        }

        .btn-msg-action {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-msg-action:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.04);
        }

        .btn-msg-action:hover.action-red {
            color: var(--accent-red);
        }

        /* --- AMAN: FOOTER INPUT AREA BAR CONTAINER (+15px EXTRA SEHINGGA SEKARANG 62px) --- */
        .input-area-container {
            width: 100%;
            padding: 12px 20px 91px 20px; 
            display: flex;
            justify-content: center;
            background-color: var(--bg-main); 
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            z-index: 10;
            flex-shrink: 0; 
        }

        .input-box {
            width: 100%;
            max-width: 740px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-box:focus-within {
            border-color: rgba(255, 42, 68, 0.3);
            box-shadow: 0 0 25px rgba(255, 42, 68, 0.05);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 0.98rem;
            resize: vertical; 
            min-height: 26px;
            max-height: 160px;
            line-height: 1.5;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        textarea::placeholder {
            color: #5c5e69;
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 10px;
        }

        .action-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-action:hover {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .dropup-mode-container {
            position: relative;
        }

        .btn-dropup-mode {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0 12px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .dropdown-menu-up {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            width: 150px;
            background-color: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 100;
            animation: slideUp 0.12s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-send {
            background-color: var(--accent-red);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            background-color: #ff455b;
            box-shadow: 0 4px 15px var(--accent-red-glow);
        }

        /* SCROLLBAR STYLE */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
    /* ── MARKDOWN RENDERING ── */
    .msg-bubble p { margin-bottom: 10px; line-height: 1.7; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { color: var(--accent-red); font-weight: 600; }
    .msg-bubble em { font-style: italic; opacity: 0.85; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 14px 0 8px; font-weight: 700; line-height: 1.3;
    }
    .msg-bubble h1 { font-size: 20px; }
    .msg-bubble h2 { font-size: 17px; }
    .msg-bubble h3 { font-size: 15px; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 22px; margin: 8px 0; }
    .msg-bubble li { margin-bottom: 5px; line-height: 1.6; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent-red);
      padding-left: 14px; margin: 10px 0;
      opacity: 0.85; font-style: italic;
    }
    .msg-bubble hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 14px 0; }
    .msg-bubble code {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 2px 6px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9em; color: #ff8a75;
    }
    .msg-bubble pre {
      background: #0a0a0d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
    }
    .msg-bubble pre code {
      background: none; border: none; padding: 0;
      color: #e2e2ea; font-size: 13px;
      display: block; white-space: pre;
    }
    .code-copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; color: #aaa;
      font-size: 11px; padding: 4px 10px;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .code-copy-btn:hover { border-color: var(--accent-red); color: var(--accent-red); background: rgba(192,57,43,0.1); }
    .code-lang-tag {
      position: absolute; top: 8px; left: 14px;
      font-size: 10px; color: #666;
      text-transform: uppercase; letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace;
    }
    .msg-bubble pre { padding-top: 30px; }
    .msg-bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
